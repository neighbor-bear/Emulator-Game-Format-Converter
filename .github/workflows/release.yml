name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          ls -la app/build/outputs/apk/release/ || true
          if [ ! -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "ERROR: Release APK not found!"
            exit 1
          fi

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*versionName[[:space:]]*["'"'"']//;s/["'"'"']//')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Rename APK file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp app/build/outputs/apk/release/app-release.apk "EmulatorGameFormatConverter-v${VERSION}.apk"

      - name: Delete previous release
        continue-on-error: true
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "v${{ steps.version.outputs.version }} (${{ steps.version.outputs.date }})"
          body: |
            ## 🎮 PSP游戏格式转换器 v${{ steps.version.outputs.version }}

            ### 更新内容
            - 优化UI布局，修复进度条显示问题
            - 设置页新增「使用说明」和「关于」按钮
            - 改善交互体验
          files: |
            EmulatorGameFormatConverter-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}